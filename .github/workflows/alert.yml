name: Missed-call alerter

# Самокрутящийся воркер: один долгий запуск опрашивает PBX каждые 90с ~5.5ч,
# потом перезапускает себя (PAT). Крон */20 — «мёртвый сторож» на случай,
# если цепочка оборвётся. Guard не даёт крутиться двум одновременно.
on:
  workflow_dispatch:
  schedule:
    - cron: '*/20 * * * *'
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  loop:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    env:
      TZ: Asia/Almaty
      ONLINEPBX_API_KEY: ${{ secrets.ONLINEPBX_API_KEY }}
      ONLINEPBX_DOMAIN:  ${{ secrets.ONLINEPBX_DOMAIN }}
      WHATCRM_KEY:       ${{ secrets.WHATCRM_KEY }}
      WHATCRM_TOKEN:     ${{ secrets.WHATCRM_TOKEN }}
      WA_ALERT_CHAT:     ${{ secrets.WA_ALERT_CHAT }}
      PAT:               ${{ secrets.PAT }}
    steps:
      - uses: actions/checkout@v4

      - name: Guard — не запускать второй воркер
        id: guard
        env:
          GH_TOKEN: ${{ secrets.PAT }}
        run: |
          n=$(gh api "repos/${{ github.repository }}/actions/workflows/alert.yml/runs?status=in_progress" --jq '.total_count' 2>/dev/null || echo 1)
          q=$(gh api "repos/${{ github.repository }}/actions/workflows/alert.yml/runs?status=queued" --jq '.total_count' 2>/dev/null || echo 0)
          echo "in_progress=$n queued=$q"
          if [ "$((n+q))" -gt 1 ]; then echo "skip=true" >> "$GITHUB_OUTPUT"; echo "Уже работает — выхожу"; fi

      - name: Poll loop (каждые 90с)
        if: steps.guard.outputs.skip != 'true'
        run: |
          git config user.email "actions@github.com"; git config user.name "alerter"
          END=$(( $(date +%s) + 19800 ))   # ~5ч30м
          N=0
          while [ "$(date +%s)" -lt "$END" ]; do
            python3 check.py || true
            N=$((N+1))
            # Дневной отчёт: раз в день после 09:00 Алматы дёргаем daily_report.yml
            # в onmed-agent (этот воркер надёжнее GitHub-планировщика). Маркер
            # daily_last.txt не даёт диспатчить повторно в тот же день.
            TODAY=$(date +%F)
            if [ "$(date +%-H)" -ge 9 ] && [ "$(cat daily_last.txt 2>/dev/null)" != "$TODAY" ]; then
              if GH_TOKEN="$PAT" gh workflow run daily_report.yml -R aslan797/onmed-agent 2>/dev/null; then
                echo "$TODAY" > daily_last.txt
                git add daily_last.txt 2>/dev/null || true
                echo "[daily] dispatched daily_report for $TODAY"
              fi
            fi
            # alerted.json — коммитим сразу (был алерт); heartbeat — раз в ~10 мин (каждый 7-й тик)
            git add alerted.json 2>/dev/null || true
            if [ $((N % 7)) -eq 0 ]; then git add heartbeat.txt 2>/dev/null || true; fi
            if ! git diff --staged --quiet; then
              git commit -q -m "state $(date +%H:%M)" || true
              git pull --rebase --autostash -q 2>/dev/null || true
              git push -q 2>/dev/null || true
            fi
            sleep 90
          done

      - name: Persist dedup state
        if: ${{ steps.guard.outputs.skip != 'true' && always() }}
        run: |
          git config user.email "actions@github.com"; git config user.name "alerter"
          git add alerted.json 2>/dev/null || true
          git diff --staged --quiet || git commit -q -m "state $(date +%H:%M)"
          git pull --rebase --autostash -q 2>/dev/null || true
          git push -q 2>/dev/null || true

      - name: Re-dispatch self (продолжить цепочку)
        if: ${{ steps.guard.outputs.skip != 'true' && always() }}
        env:
          GH_TOKEN: ${{ secrets.PAT }}
        run: gh workflow run alert.yml -R ${{ github.repository }} || true
